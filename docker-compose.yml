services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mneme
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mneme_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    # 开启 AOF 持久化，重启不丢队列/验证码/缓存
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mneme_redis_data:/data

  minio:
    image: minio/minio
    restart: always
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - mneme_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: mneme/Dockerfile
    restart: always
    # 部署纪律（2026-07-09 事故修复）：启动先 alembic upgrade head 再起服务。
    # 之前迁移和重启全靠手动，导致"改了库、容器不重启、旧ORM引用已删列、每个
    # 请求都500"的26小时静默故障。现在迁移随启动执行，迁移失败则不对外提供服务。
    command: sh -c "alembic upgrade head && uvicorn services.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      # ②-0 打包：mneme-core（Phase1 门控内核 7 元素之家）加入 import 路径。
      # 现经 PYTHONPATH 验证整条链；稳定后再固化为 Dockerfile pip install（与 obase/oprim 平价）。
      PYTHONPATH: /app:/app/packages/mneme-core
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mneme
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: mneme
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      SMS_PROVIDER: mock
      # SMS_SIGN_NAME: ""        # 阿里云短信签名（报备后填写）
      # SMS_TEMPLATE_CODE: ""    # 阿里云短信模板CODE（报备后填写）
      # 邮箱注册验证码：默认 mock（打日志）。上线设 EMAIL_PROVIDER=smtp + 填任意
      # 免费邮件服务的 SMTP 凭据（推荐国内免费 QQ/163 邮箱授权码）。
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # 环境标记：默认 dev（prod-safety 门不武装，行为不变）。真上线时设成 prod，
      # _assert_prod_safety 才会拒绝"默认JWT密钥/mock短信"启动。此前 MNEME_ENV
      # 只在 .env 里、没进 compose，pydantic 丢弃，那道门永远处于 dev 态形同虚设。
      MNEME_ENV: ${MNEME_ENV:-dev}
      # 云模型：文本用阿里云通义千问(qwen-plus)、视觉OCR用通义千问视觉(qwen-vl-max)，
      # 均中国网信办备案合规。需在 .env 配 DASHSCOPE_API_KEY（阿里云百炼 sk-...）。
      # 未配 key 时文本会回落到内核默认、视觉无 provider——上线前必须配 key 并实测。
      MNEME_LLM: qwen
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_VL_MODEL: ${QWEN_VL_MODEL:-qwen-vl-max}
      # Stratum 检索接入（C4/W2C）：专用 service 账号（非用户个人账号），HTTP 走
      # docker network（mneme-api-1 已 connect stratum-net）。未配则 rag_client
      # 静默返回空列表，不阻断对话（呈现层素材，缺失不该打断）。
      STRATUM_BASE_URL: ${STRATUM_BASE_URL:-}
      STRATUM_SERVICE_EMAIL: ${STRATUM_SERVICE_EMAIL:-}
      STRATUM_SERVICE_PASSWORD: ${STRATUM_SERVICE_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    networks:
      - default
      - helios-net
      - stratum-net
    healthcheck:
      # /health 现在真打 DB（SELECT 1），不再是恒 ok 的静态桩——能反映真实就绪度。
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: mneme/Dockerfile
    restart: always
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      PYTHONPATH: /app:/app/packages/mneme-core
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mneme
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: mneme
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      SMS_PROVIDER: mock
      # 云模型同 api：阿里云通义千问文本+视觉（worker 跑异步 OCR/变式，须一致）
      MNEME_LLM: qwen
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_VL_MODEL: ${QWEN_VL_MODEL:-qwen-vl-max}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default
      - helios-net

  # Celery beat：定时调度器（此前缺失 → 数据飞轮/FSRS 优化/AUC 评估/家长预警全休眠）。
  # 4 个 schedule 见 tasks/celery_app.py：每日3:30 BKT 校准 / 周一4:00 FSRS 优化 /
  # 周一5:00 护城河 AUC 评估 / 每日20:00 家长预警。
  beat:
    image: mneme-worker          # 复用 worker 镜像（同代码，经 .:/app 挂载），免单独构建
    restart: always
    command: celery -A tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      PYTHONPATH: /app:/app/packages/mneme-core
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mneme
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: mneme
      SMS_PROVIDER: mock
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - default
      - helios-net

networks:
  default:
  helios-net:
    external: true
  # C4/W2C：Stratum 检索接入。stratum-net 由 Stratum 自己的 docker compose 建，这里
  # 只声明为外部网络供 api 服务加入——不改 Stratum 的 compose、不重复建网络。
  stratum-net:
    external: true

# 外部命名卷：数据显式持久化，且 **`docker compose down -v` 也删不掉**（外部卷不受 compose 管理）。
# 审计 2026-07-03：此前 db 用匿名卷、minio/redis 无卷，一次 down -v 清零了 11646 个 KU
# （后从 D 盘 6-28 备份恢复）。外部化 = 结构性防呆，杜绝重演。
# 注：全新机器首次部署前需先建卷：
#   docker volume create mneme_mneme_pg_data
#   docker volume create mneme_mneme_minio_data
#   docker volume create mneme_mneme_redis_data
volumes:
  mneme_pg_data:
    external: true
    name: mneme_mneme_pg_data
  mneme_minio_data:
    external: true
    name: mneme_mneme_minio_data
  mneme_redis_data:
    external: true
    name: mneme_mneme_redis_data
